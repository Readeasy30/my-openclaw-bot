name: AI Stack Exception Alert System

# Trigger workflow on pushes and pull requests to main branches
on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run a routine maintenance check daily at midnight
    - cron: '0 0 * * *'

jobs:
  verify-and-alert:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Python environment
    - name: Set up Python
      uses: actions/checkout@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # Step 3: Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Run test suite or diagnostics script
    - name: Run AI Stack Core Verification
      env:
        # Pass the repository token securely into the runtime
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Recommended: Add your OpenRouter key to GitHub Repository Secrets
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      run: |
        python bot.py --verify-stack

    # Step 5: Trigger alert if the previous step fails
    - name: Send Alert on Failure
      if: failure()
      run: |
        echo "::error title=AI Stack Failure::The core executor or OpenRouter verification failed!"
        # Add curl webhooks for Discord/Slack channels here if needed
